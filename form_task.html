<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form task</title>
</head>

<body>
    <h1>Application Form</h1>
    <form action="">
        <label for="">First Name</label>
        <input type="text">
        <label for="">Last Name</label>
        <input type="text"><br><br>
        <label for="">Date of Birth</label>
        <input type="date">
        <label for="Age">Age</label>
        <input type="number" name="" id="Age" min="18" max="80"><br><br>
        <label for="">Gender</label>
        <select name="" id="Gender">
            <option value="Male">Male</option>
            <option value="Female">Female</option>
        </select>
        <label for="">Email Address</label>
        <input type="email" placeholder="enter your email"><br><br>
        <label for="">Position Available</label>
        <input type="radio">Junior Developer
        <input type="radio">Mid-Level Developer
        <input type="radio">Senior Developer <br><br>
        <label for="">Programming Languages</label>
        <input type="checkbox">Java
        <input type="checkbox">JavaScript
        <input type="checkbox">Python <br><br>
        <label for="">Password</label>
        <input type="password">
        <label for="">Confirm Password</label>
        <input type="password"><br><br>
        <input type="submit">
        <input type="reset">
    </form>
</body>

</html>
